# =============================================================================
# General
# =============================================================================

# Reset stale keybindings to tmux defaults before applying this config
run-shell 'tmux -f /dev/null -L temp start-server \; list-keys > /tmp/tmux_defaults && tmux unbind-key -a \; source-file /tmp/tmux_defaults'

# Use Ctrl+Space as prefix instead of Ctrl+B
set -g prefix C-space
unbind-key C-b
bind-key C-space send-prefix

# Start window and pane numbering at 1 (easier to reach on keyboard)
set -g base-index 1
set -g renumber-windows on

# Large scrollback buffer
set-option -g history-limit 1000000

# Mouse support
set -g mouse on

# Don't exit tmux when the last pane in a session is closed
set -g detach-on-destroy off

# Renumber sessions so unnamed sessions use the lowest available integer >= 1
set-hook -g after-new-session 'run-shell "$XDG_CONFIG_HOME/tmux/renumber-session.sh #{session_name}"'


# =============================================================================
# Extended Keys (CSI u)
# =============================================================================

set -s extended-keys on
set -as terminal-features 'tmux-256color:extkeys'

# Shift+Enter — send CSI u sequence so terminals can distinguish it from plain Enter
bind-key -n S-Enter send-keys Escape "[13;2u"


# =============================================================================
# Key Bindings
# =============================================================================

bind ? list-keys

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Open new windows/panes in the current working directory
bind c new-window    -c "#{pane_current_path}"
bind '"' split-window    -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Kill pane without confirmation prompt
bind-key x kill-pane

# Join another window into the current one as a side-by-side pane
bind-key J command-prompt -p "Join pane from window:" "join-pane -h -t '%%'"

# Create a named session
bind-key "N" command-prompt -p "New session name: " "new-session -s '%%'"


# =============================================================================
# Copy Mode
# =============================================================================

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X stop-selection

# Ctrl+K clears the screen and tmux scrollback history
bind -n C-k send-keys C-l \; clear-history


# =============================================================================
# Appearance
# =============================================================================

set -g status-bg colour233
set -g message-style "fg=colour233,bg=colour75"


# =============================================================================
# Sesh (session manager with fzf)
# =============================================================================

# S — fuzzy-pick and connect to a sesh session
bind-key C-s run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 100%,100% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# W — fuzzy-pick a sesh window
bind-key C-w run-shell "sesh window \"$(sesh window | fzf-tmux -p 100%,100% --prompt '🪟  ')\""


# =============================================================================
# Plugins (TPM)
# =============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'niksingh710/minimal-tmux-status'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'accessd/tmux-agent-indicator'
set -g @minimal-tmux-justify "absolute-centre"
set -g @minimal-tmux-indicator-str "#($XDG_CONFIG_HOME/tmux/git_or_tmux.sh)"
set -g @agent-indicator-done-window-title-bg "yellow"
set -g @agent-indicator-done-window-title-fg "black"
set -g @agent-indicator-notification-enabled "off"

# Keep TPM-installed plugins out of the dotfiles config dir.
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$XDG_DATA_HOME/tmux/plugins/"

# Initialize TPM — keep this at the very bottom
run '$XDG_DATA_HOME/tmux/plugins/tpm/tpm'
